name: CI

# Runs on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

# Don't waste runners: a newer commit on the same ref cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (all source files)
        run: find src scripts -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Smoke test (phone helpers)
        run: npm run smoke

      - name: Security audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high || true

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

      - name: Security audit (non-blocking)
        run: npm audit --omit=dev --audit-level=high || true
